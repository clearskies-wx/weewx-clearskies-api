name: Release

on:
  push:
    tags: ['v*.*.*']

# NOTE (coding.md §1): Third-party actions should be SHA-pinned in production.
# Tags are used here as readable references; pin each action by digest before
# the first real release by replacing `@<tag>` with `@<sha256>  # <tag>`.
# actions/checkout SHA (v4): 34e114876b0b11c390a56381ad16ebd13914f8d5

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      # Exclude tests that require a real DB, live network, or benchmark hardware.
      # integration: needs MariaDB/SQLite fixtures on weather-dev (ADR-034)
      # live_network: needs real provider API keys
      # benchmark: needs latency-stable hardware (ADR-033)
      - run: pytest -m "not integration and not live_network and not benchmark"

  pypi:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    needs: [pypi, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
