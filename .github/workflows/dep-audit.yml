name: dep-audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:
  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Audit dependencies (skip if no manifest yet)
        run: |
          set -eu
          pip install --quiet pip-audit
          if [ -f uv.lock ]; then
            # uv-managed project: export resolved deps to a flat requirements
            # file so pip-audit only audits OUR project's pinned deps, not the
            # runner's own pip / setuptools. Without --requirement, pip-audit
            # audits the runner environment, which carries CVEs unrelated to
            # this project.
            pip install --quiet uv
            # --no-emit-project drops the editable "-e file://..." line for
            # the current project itself; pip's hash-enforcement mode trips
            # on it because there's no single file to hash for an editable
            # install. We're auditing the *deps*, not the project itself.
            uv export --format requirements-txt --no-emit-project > /tmp/audit-reqs.txt
            pip-audit --requirement /tmp/audit-reqs.txt --strict
          elif [ -f poetry.lock ]; then
            pip install --quiet poetry
            poetry export --format requirements.txt --output /tmp/audit-reqs.txt --without-hashes
            pip-audit --requirement /tmp/audit-reqs.txt --strict
          elif [ -f requirements.txt ]; then
            pip-audit --requirement requirements.txt --strict
          elif [ -f pyproject.toml ]; then
            echo "::error::pyproject.toml present but no lockfile (uv.lock or poetry.lock) — coding.md §1 requires a lockfile"
            exit 1
          else
            echo "No Python manifest yet — placeholder repo. Audit will run automatically once dependencies are added."
          fi
