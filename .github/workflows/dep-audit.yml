name: dep-audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:
  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Audit (skip if no manifest yet)
        run: |
          set -eu
          pip install --quiet pip-audit
          if [ -f requirements.txt ]; then
            pip-audit --requirement requirements.txt --strict
          elif [ -f pyproject.toml ] || [ -f uv.lock ] || [ -f poetry.lock ]; then
            pip-audit --strict
          else
            echo "No Python manifest yet — placeholder repo. Audit will run automatically once dependencies are added."
          fi
